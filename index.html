<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Matheoo33</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:#0d1117;
color:#fff;
}
header{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#161b22,#21262d);
}
header h1{
font-size:3rem;
color:#58a6ff;
}
header p{
margin-top:10px;
color:#8b949e;
}
#buscar{
display:block;
margin:30px auto;
width:90%;
max-width:500px;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

.grid{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding-bottom:40px;
}

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:15px;
padding:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#58a6ff;
box-shadow:0 0 20px #58a6ff55;
}

.card h2{
color:#58a6ff;
margin-bottom:10px;
}

.tag{
display:inline-block;
padding:5px 10px;
background:#238636;
border-radius:20px;
font-size:13px;
margin:8px 0;
}

a{
display:inline-block;
margin-top:15px;
padding:10px 15px;
background:#238636;
color:white;
text-decoration:none;
border-radius:8px;
}

footer{
padding:30px;
text-align:center;
color:#8b949e;
}
</style>

</head>
<body>

<header>

<h1>💻 Portfolio GitHub</h1>

<p>Repositorio de proyectos realizados por <b>Matheoo33</b></p>

</header>

<input id="buscar" placeholder="Buscar proyecto...">

<div class="grid" id="repos"></div>

<footer>
18 proyectos • HTML • PHP • Python • SQL • JSON
</footer>

<script>

const proyectos=[

{

{

{

const cont=document.getElementById("repos");

function mostrar(lista){

cont.innerHTML="";

lista.forEach(p=>{

cont.innerHTML+=`
<div class="card">

<h2>${p.n}</h2>

<span class="tag">${p.l}</span>

<p>${p.d}</p>

<a href="${p.u}" target="_blank">
Ver en GitHub
</a>

</div>
`;

});

}

mostrar(proyectos);

document.getElementById("buscar").addEventListener("keyup",e=>{

const t=e.target.value.toLowerCase();

mostrar(proyectos.filter(p=>

p.n.toLowerCase().includes(t) ||

p.l.toLowerCase().includes(t) ||

p.d.toLowerCase().includes(t)

));

});

</script>

</body>
</html>
